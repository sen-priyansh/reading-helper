<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        :root {
            --bg: #0b1020;
            --bg-soft: #0f1629;
            --card: #111a33;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --accent: #6ee7ff;
            --accent-2: #a78bfa;
            --success: #22c55e;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            width: 380px;
            min-height: 460px;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 600px at -10% -20%, rgba(110,231,255,0.08), transparent 60%),
                radial-gradient(1000px 500px at 110% 10%, rgba(167,139,250,0.08), transparent 60%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 16px 8px 16px;
        }
        .logo {
            width: 28px; height: 28px;
            display: grid; place-items: center;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(110,231,255,0.2), rgba(167,139,250,0.2));
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .title {
            font-weight: 700; letter-spacing: 0.2px; font-size: 15px;
        }
        .subtitle { color: var(--muted); font-size: 12px; margin-top: 2px; }

        .section { padding: 12px 16px; }
        .section-title { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 8px 0 10px; }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            box-shadow: var(--shadow);
        }

        .button {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .button:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.18); }
        .button:active { transform: translateY(0); }
        .button:last-child { margin-bottom: 0; }
        .button .icon { width: 18px; height: 18px; color: var(--accent); }
        .button.danger .icon { color: var(--danger); }

        .toggle-button { background: linear-gradient(180deg, rgba(110,231,255,0.12), rgba(167,139,250,0.10)); border-color: rgba(110,231,255,0.35); }
        .toggle-button.active { background: linear-gradient(180deg, rgba(239,68,68,0.12), rgba(239,68,68,0.10)); border-color: rgba(239,68,68,0.45); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 8px; }

        .highlight-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
        }
        .highlight-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s ease; font-size: 12px; }
        .highlight-item:hover { background: rgba(255,255,255,0.04); }
        .highlight-item:last-child { border-bottom: none; }
    .highlight-text { font-weight: 600; color: var(--text); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .highlight-url { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .no-highlights { padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }

        .status { padding: 8px; margin: 8px 16px; border-radius: 8px; font-size: 12px; text-align: center; border: 1px solid var(--border); }
        .status.success { background: rgba(34,197,94,0.12); color: #86efac; }
        .status.error { background: rgba(239,68,68,0.12); color: #fecaca; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3.5 6.5a2 2 0 0 1 2-2H12v15H5.5a2 2 0 0 1-2-2v-11z"/>
                <path d="M12 19.5V4.5h6.5a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H12z"/>
            </svg>
        </div>
        <div>
            <div class="title">Reading Helper</div>
            <div class="subtitle">Focus, highlight, and learn faster</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Focus & Navigation</div>
        <div class="card">
            <div class="grid">
                <button id="focusMode" class="button toggle-button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="3.5"/>
                        <path d="M3 12h3M18 12h3M12 3v3M12 18v3"/>
                    </svg>
                    <span id="focusText">Enable Focus Mode</span>
                </button>
                <button id="clearSelection" class="button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M9 9l6 6M15 9l-6 6"/>
                    </svg>
                    <span>Clear Current Selection</span>
                </button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Quick Actions</div>
        <div class="card">
            <div class="grid">
                <button id="highlightAll" class="button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 3v4M12 17v4M4.2 7l2.8 2.8M17 16.8l2.8 2.8M3 12h4M17 12h4M4.2 17l2.8-2.8M17 7.2l2.8-2.8"/>
                    </svg>
                    <span>Show All Highlights</span>
                </button>
                <button id="exportHighlights" class="button">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 3v12"/>
                        <path d="M8.5 11.5L12 15l3.5-3.5"/>
                        <rect x="4" y="16" width="16" height="4" rx="1"/>
                    </svg>
                    <span>Export Highlights</span>
                </button>
                <button id="clearAllHighlights" class="button danger">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M4 7h16"/>
                        <path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12"/>
                        <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
                        <path d="M10 11v6M14 11v6"/>
                    </svg>
                    <span>Clear All Highlights</span>
                </button>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Highlighted Text (<span id="highlightCount">0</span>)</div>
        <div class="card">
            <div id="highlightsList" class="highlight-list">
                <div class="no-highlights">
                    No highlights found on this page.
                </div>
            </div>
        </div>
    </div>

    <div id="status" class="status" style="display: none;"></div>

    <script src="popup.js"></script>
</body>
</html>
